version: '3.9'

# ─── Local Flage validation stack ────────────────────────────────────────────
# Starts: anvil (local EVM) + mock-kv (0G KV stub) + agent + settlement + dashboard
# Does NOT require real 0G nodes, TEE hardware, or Binance credentials.

services:

  # ── 1. Local EVM (Foundry Anvil) ──────────────────────────────────────────
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: anvil
    command: >
      --host 0.0.0.0
      --port 8545
      --chain-id 31337
      --block-time 1
      --accounts 10
      --balance 10000
      --mnemonic "test test test test test test test test test test test junk"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10

  # ── 2. Contract deployer (runs once, then exits) ───────────────────────────
  deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    depends_on:
      anvil:
        condition: service_healthy
    working_dir: /app/packages/contracts
    volumes:
      - .:/app
    environment:
      DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"  # anvil account 0
      FLASH_LOAN_PROVIDER: "0x0000000000000000000000000000000000000000"
    command: >
      sh -c "
        forge install --no-git &&
        forge script script/Deploy.s.sol
          --rpc-url http://anvil:8545
          --broadcast
          --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
        | tee /tmp/deploy.log &&
        grep 'VAULT_ADDRESS' /tmp/deploy.log
      "

  # ── 3. Mock 0G KV Layer (replaces live 0G Storage KV node) ───────────────
  mock-kv:
    build:
      context: ./scripts
      dockerfile: Dockerfile.mock-kv
    ports:
      - "6789:6789"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6789/health"]
      interval: 2s
      timeout: 3s
      retries: 10

  # ── 4. Market data seeder (feeds prices into mock-kv) ─────────────────────
  seeder:
    build:
      context: ./scripts
      dockerfile: Dockerfile.seeder
    depends_on:
      mock-kv:
        condition: service_healthy
    environment:
      KV_URL: "http://mock-kv:6789"
      STREAM_ID: "local-stream"
      PAIRS: "ETH/USDC,BTC/USDC"
    restart: unless-stopped

  # ── 5. Trading agent (TEE software-mode — no real enclave) ────────────────
  agent:
    build:
      context: ./packages/agent
      dockerfile: Dockerfile
    depends_on:
      mock-kv:
        condition: service_healthy
    environment:
      # TEE runs in software mode locally — key generated from os.urandom
      TEE_HARDWARE_AVAILABLE: "0"
      MODEL_PATH: "/app/model/model.pt"
      VAULT_ADDRESS: "${VAULT_ADDRESS:-0x0000000000000000000000000000000000000000}"
      TARGET_PAIRS: "ETH/USDC,BTC/USDC"
      MAX_POSITION_SIZE: "1000000000000000000"   # 1 ETH in wei
      CONFIDENCE_THRESHOLD: "0.60"
      MAX_DRAWDOWN: "0.05"
      OG_RPC_URL: "http://anvil:8545"
      OG_KV_NODE_URL: "http://mock-kv:6789"
      OG_STREAM_ID: "local-stream"
      SETTLEMENT_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"  # anvil account 1
      POLL_INTERVAL_SECONDS: "1.0"
      DEVICE: "cpu"
    volumes:
      - ./scripts/dummy_model:/app/model
    restart: unless-stopped

  # ── 6. Settlement service ──────────────────────────────────────────────────
  settlement:
    build:
      context: ./packages/settlement
      dockerfile: Dockerfile
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      OG_RPC_URL: "http://anvil:8545"
      VAULT_ADDRESS: "${VAULT_ADDRESS:-0x0000000000000000000000000000000000000000}"
      PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      MODE: "stdin"
    restart: unless-stopped

  # ── 7. Dashboard ───────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
    depends_on:
      anvil:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_RPC_URL: "http://localhost:8545"
      NEXT_PUBLIC_VAULT_ADDRESS: "${VAULT_ADDRESS:-0x0000000000000000000000000000000000000000}"
      NEXT_PUBLIC_EXPLORER_URL: "http://localhost:8545"
      NEXT_PUBLIC_TEE_KEY: "${TEE_KEY:-}"
    command: npm run dev
