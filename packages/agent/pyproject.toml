[project]
name = "flage-agent"
version = "0.1.0"
description = "AI trading agent for sealed inference inside TEE"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.2.0",
    "numpy>=1.26.0",
    "web3>=6.15.0",
    "eth-account>=0.11.0",
    "aiohttp>=3.9.0",
    "pydantic>=2.5.0",
]

[project.optional-dependencies]
train = [
    "pandas>=2.1.0",
    "pyarrow>=14.0.0",
    "scikit-learn>=1.3.0",
    "matplotlib>=3.8.0",
    "tensorboard>=2.15.0",
]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.1.0",
    "mypy>=1.7.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
asyncio_mode = "auto"
