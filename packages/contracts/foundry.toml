[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "shanghai"

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
og_mainnet = "https://evmrpc.0g.ai"
og_testnet = "https://evmrpc-testnet.0g.ai"

[etherscan]
og_mainnet = { key = "${EXPLORER_API_KEY}", url = "https://chainscan.0g.ai/api" }
og_testnet = { key = "${EXPLORER_API_KEY}", url = "https://chainscan-galileo.0g.ai/api" }
